<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ORBIT — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #060811;
      --surface: #0d1117;
      --card:    #111827;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text:    #e8eaf6;
      --muted:   rgba(232,234,246,0.4);
      --accent:  #6ee7f7;
      --red:     #f87171;
      --green:   #4ade80;
      --gold:    #fbbf24;
      --purple:  #c084fc;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; }

    /* STARS */
    #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--dur) ease-in-out infinite; opacity: 0; }
    @keyframes twinkle { 0%,100%{opacity:0}50%{opacity:var(--op)} }

    /* LOGIN */
    #loginScreen {
      position: relative; z-index: 10;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-box {
      background: var(--card); border: 1px solid var(--border2);
      border-radius: 20px; padding: 36px; width: 100%; max-width: 360px;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .login-brand {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-family: 'Space Mono', monospace; font-size: 1.2rem; font-weight: 700;
      letter-spacing: 0.1em; margin-bottom: 4px;
    }
    .ring { width: 28px; height: 28px; border-radius: 50%; background: conic-gradient(from 0deg,var(--red),var(--purple),var(--red)); animation: spin 6s linear infinite; display: flex; align-items: center; justify-content: center; }
    .ring::after { content:''; width:14px; height:14px; background:var(--card); border-radius:50%; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .login-sub { text-align: center; color: var(--muted); font-size: 0.8rem; margin-bottom: 26px; }
    .lf { margin-bottom: 14px; }
    .lf label { display: block; font-size: 0.72rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
    .lf input { width: 100%; padding: 10px 13px; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .lf input:focus { border-color: var(--red); }
    .lerr { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--red); padding: 9px 13px; border-radius: 10px; font-size: 0.8rem; margin-bottom: 14px; display: none; }
    .lbtn { width: 100%; padding: 11px; background: linear-gradient(135deg, var(--red), var(--purple)); border: none; color: #fff; border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 0.92rem; font-weight: 700; cursor: pointer; transition: transform 0.18s, box-shadow 0.18s; }
    .lbtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(248,113,113,0.3); }

    /* ADMIN APP */
    #adminApp { display: none; position: relative; z-index: 1; }

    /* TOPBAR */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 62px; background: rgba(6,8,17,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .tbrand { display: flex; align-items: center; gap: 10px; font-family: 'Space Mono', monospace; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.1em; }
    .admin-tag { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); color: var(--red); padding: 3px 10px; border-radius: 99px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .logout-btn { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: var(--red); padding: 7px 16px; border-radius: 8px; cursor: pointer; font-family: 'Outfit', sans-serif; font-size: 0.82rem; font-weight: 600; transition: all 0.18s; }
    .logout-btn:hover { background: rgba(248,113,113,0.2); }

    /* MAIN */
    .main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; display: flex; flex-direction: column; gap: 24px; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 14px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; }
    .stat-val { font-family: 'Space Mono', monospace; font-size: 2rem; font-weight: 700; line-height: 1; margin-bottom: 5px; }
    .stat-lbl { font-size: 0.78rem; color: var(--muted); font-weight: 500; }

    /* SECTION */
    .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
    .section-title span { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted); font-weight: 400; }

    /* USER TABLE */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface); }
    th { padding: 12px 16px; text-align: left; font-size: 0.72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; font-family: 'Space Mono', monospace; }
    td { padding: 13px 16px; font-size: 0.88rem; border-top: 1px solid var(--border); }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .user-name { font-weight: 600; }
    .user-email { color: var(--muted); font-size: 0.8rem; }
    .badge { display: inline-flex; align-items: center; justify-content: center; padding: 3px 10px; border-radius: 99px; font-size: 0.72rem; font-weight: 600; font-family: 'Space Mono', monospace; }
    .badge-tasks { background: rgba(110,231,247,0.12); color: var(--accent); }
    .badge-done  { background: rgba(74,222,128,0.12);  color: var(--green); }
    .badge-proj  { background: rgba(192,132,252,0.12); color: var(--purple); }
    .date { font-family: 'Space Mono', monospace; font-size: 0.74rem; color: var(--muted); }
    .del-btn { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: var(--red); padding: 5px 12px; border-radius: 7px; cursor: pointer; font-size: 0.78rem; font-weight: 600; font-family: 'Outfit', sans-serif; transition: all 0.15s; }
    .del-btn:hover { background: rgba(248,113,113,0.25); }
    .view-btn { background: rgba(110,231,247,0.1); border: 1px solid rgba(110,231,247,0.2); color: var(--accent); padding: 5px 12px; border-radius: 7px; cursor: pointer; font-size: 0.78rem; font-weight: 600; font-family: 'Outfit', sans-serif; transition: all 0.15s; margin-right: 6px; }
    .view-btn:hover { background: rgba(110,231,247,0.2); }

    .empty-row td { text-align: center; color: var(--muted); padding: 40px; }

    /* MODAL */
    .overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.22s; }
    .overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--card); border: 1px solid var(--border2); border-radius: 18px; padding: 24px; width: 100%; max-width: 540px; max-height: 80vh; overflow-y: auto; transform: scale(0.94); transition: transform 0.25s cubic-bezier(.23,1,.32,1); }
    .overlay.open .modal { transform: scale(1); }
    .modal-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .modal-title { font-size: 1.05rem; font-weight: 700; }
    .xcls { background: rgba(255,255,255,0.06); border: none; color: var(--muted); width: 28px; height: 28px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; }
    .task-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; margin-bottom: 8px; }
    .task-item-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; }
    .task-item-name.done { text-decoration: line-through; color: var(--muted); }
    .task-item-meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag { font-size: 0.67rem; font-weight: 600; padding: 2px 8px; border-radius: 99px; font-family: 'Space Mono', monospace; }
    .p-high   { background: rgba(248,113,113,0.14); color: var(--red); }
    .p-medium { background: rgba(251,191,36,0.14);  color: var(--gold); }
    .p-low    { background: rgba(74,222,128,0.14);  color: var(--green); }

    /* LOADING */
    .loading { text-align: center; padding: 40px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.78rem; }

    /* TOAST */
    .toast { position: fixed; bottom: 22px; right: 22px; z-index: 300; background: var(--card); border: 1px solid var(--border2); color: var(--text); padding: 11px 18px; border-radius: 12px; font-size: 0.82rem; font-weight: 500; transform: translateY(55px); opacity: 0; transition: all 0.28s cubic-bezier(.23,1,.32,1); pointer-events: none; }
    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 680px) {
      .main { padding: 16px 14px; }
      table { font-size: 0.8rem; }
      th, td { padding: 10px 10px; }
    }
  </style>
</head>
<body>

<div id="stars"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-brand">
      <div class="ring"></div>
      ORBIT ADMIN
    </div>
    <p class="login-sub">Restricted access — admins only</p>
    <div class="lf">
      <label>Admin Secret Key</label>
      <input type="password" id="keyInput" placeholder="Enter admin key..." />
    </div>
    <div class="lerr" id="lerr">Wrong key — access denied</div>
    <button class="lbtn" onclick="adminLogin()">Access Dashboard</button>
  </div>
</div>

<!-- ADMIN APP -->
<div id="adminApp">
  <header class="topbar">
    <div class="tbrand">
      <div class="ring"></div>
      ORBIT
      <span class="admin-tag">Admin</span>
    </div>
    <button class="logout-btn" onclick="adminLogout()">Sign Out</button>
  </header>

  <div class="main">
    <!-- STATS -->
    <div>
      <div class="section-title">Overview</div>
      <div class="stats-grid" id="statsGrid">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <!-- USERS -->
    <div>
      <div class="section-title">
        All Users <span id="userCount"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Password</th>
              <th>Projects</th>
              <th>Tasks</th>
              <th>Done</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTable">
            <tr class="empty-row"><td colspan="6">Loading users...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- TASKS MODAL -->
<div class="overlay" id="tasksModal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="modalTitle">User Tasks</div>
      <button class="xcls" onclick="closeModal()">✕</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* STARS */
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<100;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2+0.4;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${(Math.random()*4+2).toFixed(1)}s;--op:${(Math.random()*0.6+0.1).toFixed(2)};animation-delay:${(Math.random()*5).toFixed(2)}s;`;
    c.appendChild(s);
  }
})();

let adminKey = sessionStorage.getItem('orbit_admin_key') || '';

/* LOGIN */
function adminLogin() {
  const key = document.getElementById('keyInput').value.trim();
  if (!key) return;
  adminKey = key;
  sessionStorage.setItem('orbit_admin_key', key);
  loadDashboard();
}

function adminLogout() {
  adminKey = '';
  sessionStorage.removeItem('orbit_admin_key');
  document.getElementById('adminApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('keyInput').value = '';
}

document.getElementById('keyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') adminLogin();
});

/* API */
async function adminApi(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

/* LOAD DASHBOARD */
async function loadDashboard() {
  try {
    const [stats, users] = await Promise.all([
      adminApi('GET', '/api/admin/stats'),
      adminApi('GET', '/api/admin/users'),
    ]);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    document.getElementById('lerr').style.display = 'none';
    renderStats(stats);
    renderUsers(users);
  } catch(e) {
    document.getElementById('lerr').style.display = 'block';
    adminKey = '';
    sessionStorage.removeItem('orbit_admin_key');
  }
}

/* TOGGLE PASSWORD */
function togglePw(id, hash) {
  const el = document.getElementById('pw-'+id);
  const btn = el.nextElementSibling;
  if(btn.textContent === 'Show') {
    el.textContent = hash;
    el.style.color = 'var(--accent)';
    el.style.wordBreak = 'break-all';
    el.style.maxWidth = '200px';
    el.style.display = 'block';
    btn.textContent = 'Hide';
  } else {
    el.textContent = '••••••••';
    el.style.color = 'var(--muted)';
    el.style.display = '';
    btn.textContent = 'Show';
  }
}

/* STATS */
function renderStats(s) {
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${s.totalUsers}</div><div class="stat-lbl">Total Users</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--purple)">${s.totalProjects}</div><div class="stat-lbl">Total Projects</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--gold)">${s.totalTasks}</div><div class="stat-lbl">Total Tasks</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green)">${s.doneTasks}</div><div class="stat-lbl">Completed Tasks</div></div>
  `;
}

/* USERS */
function renderUsers(users) {
  document.getElementById('userCount').textContent = `— ${users.length} registered`;
  const tbody = document.getElementById('usersTable');
  if (!users.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No users yet</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td>
        <div class="user-name">${u.username}</div>
        <div class="user-email">${u.email}</div>
      </td>
      <td>
        <div style="display:flex;align-items:center;gap:6px;">
          <span id="pw-${u.id}" style="font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:.05em;">••••••••</span>
          <button onclick="togglePw('${u.id}','${u.password}')" style="background:rgba(255,255,255,.06);border:1px solid var(--border2);color:var(--muted);padding:2px 8px;border-radius:6px;cursor:pointer;font-size:.7rem;font-family:'Outfit',sans-serif;">Show</button>
        </div>
      </td>
      <td><span class="badge badge-proj">${u.projects}</span></td>
      <td><span class="badge badge-tasks">${u.tasks}</span></td>
      <td><span class="badge badge-done">${u.doneTasks}</span></td>
      <td><span class="date">${fmtDate(u.created_at)}</span></td>
      <td>
        <button class="view-btn" onclick="viewTasks('${u.id}','${u.username}')">📋 Tasks</button>
        <button class="del-btn" onclick="deleteUser('${u.id}','${u.username}')">🗑 Delete</button>
      </td>
    </tr>
  `).join('');
}

/* VIEW USER TASKS */
async function viewTasks(userId, username) {
  document.getElementById('modalTitle').textContent = `${username}'s Tasks`;
  document.getElementById('modalContent').innerHTML = '<div class="loading">Loading...</div>';
  document.getElementById('tasksModal').classList.add('open');
  try {
    const tasks = await adminApi('GET', `/api/admin/users/${userId}/tasks`);
    if (!tasks.length) {
      document.getElementById('modalContent').innerHTML = '<div class="loading">No tasks yet</div>';
      return;
    }
    document.getElementById('modalContent').innerHTML = tasks.map(t => `
      <div class="task-item">
        <div class="task-item-name ${t.done ? 'done' : ''}">${t.done ? '✓ ' : ''}${t.name}</div>
        ${t.notes ? `<div style="font-size:0.78rem;color:var(--muted);margin-bottom:5px">${t.notes}</div>` : ''}
        <div class="task-item-meta">
          <span class="tag p-${t.priority}">${t.priority}</span>
          ${t.due ? `<span class="tag" style="background:rgba(255,255,255,0.06);color:var(--muted)">${t.due}</span>` : ''}
        </div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('modalContent').innerHTML = '<div class="loading">Failed to load tasks</div>';
  }
}

function closeModal() {
  document.getElementById('tasksModal').classList.remove('open');
}

/* DELETE USER */
async function deleteUser(id, username) {
  if (!confirm(`Delete user "${username}" and ALL their data? This cannot be undone.`)) return;
  try {
    await adminApi('DELETE', `/api/admin/users/${id}`);
    toast(`🗑 ${username} deleted`);
    loadDashboard();
  } catch(e) {
    toast('⚠ Failed to delete user');
  }
}

/* HELPERS */
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(window._tt); window._tt = setTimeout(() => el.classList.remove('show'), 2400);
}

/* AUTO LOGIN if key saved */
if (adminKey) loadDashboard();
</script>
</body>
</html>
