<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GIGAPOLY 🎲</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root{--bg:#060811;--surface:#0d1117;--card:#111827;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#e8eaf6;--muted:rgba(232,234,246,.4);--accent:#6ee7f7;--gold:#fbbf24;--red:#f87171;--green:#4ade80;--purple:#c084fc;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

    /* ── LOADER ── */
    #loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
    .loader-ring{width:44px;height:44px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--accent);animation:spin .8s linear infinite;}
    .loader-text{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--muted);text-align:center;max-width:300px;}

    /* ── LOBBY ── */
    #lobbyScreen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:24px;}
    #lobbyScreen.show{display:flex;}
    .lobby-box{background:var(--card);border:1px solid var(--border2);border-radius:22px;padding:36px;width:100%;max-width:480px;animation:fadeUp .3s ease;display:flex;flex-direction:column;gap:20px;}
    .lobby-brand{font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;letter-spacing:.1em;text-align:center;background:linear-gradient(90deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .lobby-code{background:var(--surface);border:2px dashed var(--accent);border-radius:14px;padding:16px;text-align:center;}
    .lobby-code-val{font-family:'Space Mono',monospace;font-size:2rem;font-weight:700;color:var(--accent);letter-spacing:.25em;}
    .lobby-code-sub{font-size:.75rem;color:var(--muted);margin-top:4px;}
    .lobby-section-title{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
    .lobby-player-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:6px;}
    .lobby-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:#060811;flex-shrink:0;}
    .lobby-pname{flex:1;font-size:.9rem;font-weight:600;}
    .lobby-status-text{text-align:center;font-size:.8rem;color:var(--muted);animation:pulse 2s infinite;}
    .lobby-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--purple));border:none;color:#060811;border-radius:12px;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:transform .18s,box-shadow .18s;}
    .lobby-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(110,231,247,.3);}
    .lobby-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
    .lobby-leave{width:100%;padding:10px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);border-radius:12px;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .15s;}
    .lobby-leave:hover{background:rgba(248,113,113,.2);}

    /* ── GAME ── */
    #gameScreen{display:none;width:100vw;height:100vh;grid-template-columns:1fr 300px;grid-template-rows:50px 1fr;}
    #gameScreen.show{display:grid;}

    .gtop{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(6,8,17,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);}
    .gtop-brand{font-family:'Space Mono',monospace;font-size:.9rem;font-weight:700;letter-spacing:.1em;background:linear-gradient(90deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .gtop-right{display:flex;gap:10px;align-items:center;}
    .gtop-money{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--green);font-weight:700;}
    .leave-btn{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--red);padding:5px 12px;border-radius:7px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;}
    .leave-btn:hover{background:rgba(248,113,113,.22);}

    .board-area{position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg);padding:8px;}
    #boardCanvas{border-radius:4px;}

    .sidebar{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
    .players-panel{padding:10px;border-bottom:1px solid var(--border);flex-shrink:0;}
    .panel-title{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
    .player-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;border:1px solid transparent;margin-bottom:4px;}
    .player-row.active{background:rgba(110,231,247,.08);border-color:rgba(110,231,247,.2);}
    .player-row.bankrupt{opacity:.35;}
    .p-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#060811;flex-shrink:0;}
    .p-info{flex:1;min-width:0;}
    .p-name{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .p-money{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--green);}
    .p-badge{font-size:.62rem;flex-shrink:0;}

    .action-panel{padding:10px;border-bottom:1px solid var(--border);flex-shrink:0;}
    .turn-label{font-size:.74rem;color:var(--muted);margin-bottom:8px;}
    .turn-name{color:var(--accent);font-weight:700;}
    .dice-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
    .die{width:40px;height:40px;background:var(--card);border:1px solid var(--border2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
    .die.rolling{animation:shake .12s infinite;}
    .dice-sum{font-family:'Space Mono',monospace;font-size:.78rem;color:var(--muted);}
    .action-btns{display:flex;flex-direction:column;gap:6px;}
    .abtn{padding:8px 14px;border-radius:9px;font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;border:1px solid;transition:all .15s;}
    .abtn:disabled{opacity:.38;cursor:not-allowed;}
    .abtn-roll{background:linear-gradient(135deg,var(--accent),var(--purple));border-color:transparent;color:#060811;}
    .abtn-roll:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(110,231,247,.3);}
    .abtn-buy{background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.35);color:var(--green);}
    .abtn-buy:hover:not(:disabled){background:rgba(74,222,128,.25);}
    .abtn-pass{background:rgba(255,255,255,.05);border-color:var(--border2);color:var(--muted);}
    .abtn-pass:hover:not(:disabled){color:var(--text);}
    .abtn-jail{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.3);color:var(--gold);}
    .abtn-jail:hover:not(:disabled){background:rgba(251,191,36,.22);}

    .prop-info{background:rgba(13,17,28,.9);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;font-size:.74rem;color:var(--muted);margin-bottom:6px;display:none;}
    .prop-info.show{display:block;}
    .prop-info-name{font-size:.86rem;font-weight:700;color:var(--text);margin-bottom:2px;}
    .prop-info-price{color:var(--gold);font-family:'Space Mono',monospace;font-size:.8rem;}

    .log-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .log-title{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;padding:8px 10px 5px;flex-shrink:0;border-bottom:1px solid var(--border);}
    .log-list{flex:1;overflow-y:auto;padding:6px 10px;display:flex;flex-direction:column;gap:2px;}
    .log-list::-webkit-scrollbar{width:3px;}
    .log-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
    .log-item{font-size:.7rem;color:var(--muted);line-height:1.4;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);}
    .log-item.hi{color:var(--text);}

    .chat-wrap{border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;max-height:160px;}
    .chat-list{flex:1;overflow-y:auto;padding:5px 8px;display:flex;flex-direction:column;gap:2px;}
    .chat-item{font-size:.72rem;line-height:1.4;}
    .chat-item .cn{color:var(--accent);font-weight:700;margin-right:4px;}
    .chat-row{display:flex;gap:6px;padding:5px 8px;border-top:1px solid var(--border);}
    .chat-input{flex:1;background:var(--card);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.78rem;padding:5px 9px;outline:none;}
    .chat-input:focus{border-color:var(--accent);}
    .chat-send{background:var(--accent);border:none;color:#060811;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

    /* ── OVERLAYS ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
    .popup{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:26px;max-width:380px;width:100%;text-align:center;animation:fadeUp .22s ease;}
    .popup-icon{font-size:2.6rem;margin-bottom:10px;}
    .popup-title{font-size:1.15rem;font-weight:800;margin-bottom:6px;}
    .popup-text{font-size:.84rem;color:var(--muted);margin-bottom:18px;line-height:1.5;}
    .popup-btn{padding:10px 24px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--purple));border:none;color:#060811;transition:transform .15s;}
    .popup-btn:hover{transform:translateY(-1px);}

    #winnerScreen{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(14px);display:none;align-items:center;justify-content:center;z-index:200;}
    #winnerScreen.show{display:flex;}
    .winner-box{background:var(--card);border:1px solid var(--border2);border-radius:22px;padding:40px;text-align:center;max-width:380px;animation:fadeUp .4s ease;}
    .winner-emoji{font-size:3.5rem;margin-bottom:12px;}
    .winner-title{font-family:'Space Mono',monospace;font-size:1.2rem;font-weight:700;color:var(--gold);margin-bottom:6px;}
    .winner-name{font-size:1.6rem;font-weight:800;margin-bottom:6px;}
    .winner-sub{font-size:.84rem;color:var(--muted);margin-bottom:22px;}
    .winner-btn{padding:12px 28px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--purple));border:none;color:#060811;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:800;cursor:pointer;transition:transform .18s;}
    .winner-btn:hover{transform:translateY(-2px);}
  </style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Connecting...</div>
</div>

<!-- LOBBY SCREEN -->
<div id="lobbyScreen">
  <div class="lobby-box">
    <div class="lobby-brand">🎲 GIGAPOLY</div>
    <div class="lobby-code">
      <div class="lobby-code-val" id="lobbyCodeVal">------</div>
      <div class="lobby-code-sub">Share this code with friends</div>
    </div>
    <div>
      <div class="lobby-section-title">Players in Room</div>
      <div id="lobbyPlayersList"></div>
    </div>
    <div class="lobby-status-text" id="lobbyStatusText">Waiting for players...</div>
    <button class="lobby-btn" id="lobbyStartBtn" onclick="startGame()" disabled>🎮 Start Game</button>
    <button class="lobby-leave" onclick="leaveAndGoHome()">← Leave Room</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen">
  <header class="gtop">
    <span class="gtop-brand">🎲 GIGAPOLY</span>
    <span style="font-family:'Space Mono',monospace;font-size:.72rem;color:var(--muted)" id="roomLabel">Room: ------</span>
    <div class="gtop-right">
      <span class="gtop-money" id="myMoney">$1500</span>
      <button class="leave-btn" onclick="leaveAndGoHome()">Leave</button>
    </div>
  </header>

  <div class="board-area">
    <canvas id="boardCanvas"></canvas>
  </div>

  <aside class="sidebar">
    <div class="players-panel">
      <div class="panel-title">Players</div>
      <div id="playersList"></div>
    </div>
    <div class="action-panel">
      <div class="turn-label">Turn: <span class="turn-name" id="turnName">-</span></div>
      <div class="dice-row">
        <div class="die" id="die1">🎲</div>
        <div class="die" id="die2">🎲</div>
        <span class="dice-sum" id="diceSum"></span>
      </div>
      <div class="prop-info" id="propInfo">
        <div class="prop-info-name" id="propInfoName"></div>
        <div class="prop-info-price" id="propInfoPrice"></div>
      </div>
      <div class="action-btns">
        <button class="abtn abtn-roll" id="btnRoll" onclick="act('roll')" disabled>🎲 Roll Dice</button>
        <button class="abtn abtn-buy"  id="btnBuy"  onclick="act('buy')"  disabled style="display:none">💰 Buy Property</button>
        <button class="abtn abtn-pass" id="btnPass" onclick="act('pass')" disabled style="display:none">⏭ Pass</button>
        <button class="abtn abtn-jail" id="btnJail" onclick="act('pay_jail')" disabled style="display:none">🔓 Pay $50 Jail</button>
      </div>
    </div>
    <div class="log-panel">
      <div class="log-title">Game Log</div>
      <div class="log-list" id="logList"></div>
    </div>
    <div class="chat-wrap">
      <div class="chat-list" id="chatList"></div>
      <div class="chat-row">
        <input class="chat-input" id="chatInput" placeholder="Chat..." maxlength="100"/>
        <button class="chat-send" onclick="sendChat()">➤</button>
      </div>
    </div>
  </aside>
</div>

<!-- CARD POPUP -->
<div class="modal-overlay" id="cardOverlay" style="display:none">
  <div class="popup">
    <div class="popup-icon">🃏</div>
    <div class="popup-title" id="cardTitle">Card</div>
    <div class="popup-text" id="cardText"></div>
    <button class="popup-btn" onclick="document.getElementById('cardOverlay').style.display='none'">OK</button>
  </div>
</div>

<!-- WINNER -->
<div id="winnerScreen">
  <div class="winner-box">
    <div class="winner-emoji">🏆</div>
    <div class="winner-title">WINNER!</div>
    <div class="winner-name" id="winnerName"></div>
    <div class="winner-sub">Conquered the Ukrainian economy!</div>
    <button class="winner-btn" onclick="leaveAndGoHome()">Back to ORBIT</button>
  </div>
</div>

<script>
// ── INIT ──────────────────────────────────────
const token    = localStorage.getItem('orbit_token');
const myUsername = localStorage.getItem('orbit_user');
const roomCode = (new URLSearchParams(location.search).get('room') || '').toUpperCase();

if (!token || !myUsername || !roomCode) { location.href = '/'; }

const socket = io();
let myId = null;
let gameState = null;
let isHost = false;
let currentRoom = null;

// ── BOARD DATA ────────────────────────────────
const BOARD=[
  {id:0,name:'GO',type:'go'},
  {id:1,name:'Kyiv',type:'property',color:'#8dd3c7',price:60},
  {id:2,name:'Community\nChest',type:'community'},
  {id:3,name:'Odesa',type:'property',color:'#8dd3c7',price:60},
  {id:4,name:'Income\nTax',type:'tax'},
  {id:5,name:'Airport',type:'station',price:200},
  {id:6,name:'Lviv',type:'property',color:'#fb8072',price:100},
  {id:7,name:'Chance',type:'chance'},
  {id:8,name:'Dnipro',type:'property',color:'#fb8072',price:100},
  {id:9,name:'Kharkiv',type:'property',color:'#fb8072',price:120},
  {id:10,name:'Jail',type:'jail'},
  {id:11,name:'Zaporizhzhia',type:'property',color:'#80b1d3',price:140},
  {id:12,name:'Electric\nCo.',type:'utility'},
  {id:13,name:'Mykolaiv',type:'property',color:'#80b1d3',price:140},
  {id:14,name:'Vinnytsia',type:'property',color:'#80b1d3',price:160},
  {id:15,name:'Station\nNorth',type:'station',price:200},
  {id:16,name:'Poltava',type:'property',color:'#fdb462',price:180},
  {id:17,name:'Community\nChest',type:'community'},
  {id:18,name:'Sumy',type:'property',color:'#fdb462',price:180},
  {id:19,name:'Cherkasy',type:'property',color:'#fdb462',price:200},
  {id:20,name:'Free\nParking',type:'parking'},
  {id:21,name:'Zhytomyr',type:'property',color:'#bc80bd',price:220},
  {id:22,name:'Chance',type:'chance'},
  {id:23,name:'Rivne',type:'property',color:'#bc80bd',price:220},
  {id:24,name:'Lutsk',type:'property',color:'#bc80bd',price:240},
  {id:25,name:'Station\nWest',type:'station',price:200},
  {id:26,name:'Ternopil',type:'property',color:'#b3de69',price:260},
  {id:27,name:'Ivano-\nFrankivsk',type:'property',color:'#b3de69',price:260},
  {id:28,name:'Water\nWorks',type:'utility'},
  {id:29,name:'Uzhhorod',type:'property',color:'#b3de69',price:280},
  {id:30,name:'Go To\nJail',type:'gotojail'},
  {id:31,name:'Chernivtsi',type:'property',color:'#ffed6f',price:300},
  {id:32,name:'Khmelnytskyi',type:'property',color:'#ffed6f',price:300},
  {id:33,name:'Community\nChest',type:'community'},
  {id:34,name:'Zaporizhzhia-2',type:'property',color:'#ffed6f',price:320},
  {id:35,name:'Station\nEast',type:'station',price:200},
  {id:36,name:'Chance',type:'chance'},
  {id:37,name:'Donetsk',type:'property',color:'#fc8d59',price:350},
  {id:38,name:'Luxury\nTax',type:'tax'},
  {id:39,name:'Luhansk',type:'property',color:'#e31a1c',price:400},
];

// ── CANVAS ────────────────────────────────────
const canvas = document.getElementById('boardCanvas');
const ctx = canvas.getContext('2d');
let CORNER=80, CELL=52, SIZE=0;

function resize() {
  const area = document.querySelector('.board-area');
  if (!area) return;
  const avail = Math.min(area.clientWidth - 16, area.clientHeight - 16);
  CORNER = Math.floor(avail / 11.5);
  CELL   = Math.floor((avail - CORNER * 2) / 9);
  SIZE   = CORNER * 2 + CELL * 9;
  canvas.width = SIZE;
  canvas.height = SIZE;
  draw();
}

function cellPos(id) {
  const c=CELL,co=CORNER,s=SIZE;
  if(id===0)  return{x:s-co,y:s-co,w:co,h:co};
  if(id<=9)   return{x:s-co-id*c,y:s-co,w:c,h:co};
  if(id===10) return{x:0,y:s-co,w:co,h:co};
  if(id<=19)  return{x:0,y:s-co-(id-10)*c,w:co,h:c};
  if(id===20) return{x:0,y:0,w:co,h:co};
  if(id<=29)  return{x:(id-20)*c,y:0,w:c,h:co};
  if(id===30) return{x:s-co,y:0,w:co,h:co};
  if(id<=39)  return{x:s-co,y:(id-30)*c,w:co,h:c};
}

function draw() {
  if(!SIZE) return;
  ctx.clearRect(0,0,SIZE,SIZE);
  ctx.fillStyle='#0a1a0d'; ctx.fillRect(0,0,SIZE,SIZE);
  ctx.fillStyle='#060e08'; ctx.fillRect(CORNER,CORNER,SIZE-CORNER*2,SIZE-CORNER*2);

  // Center label
  ctx.save();
  ctx.font=`bold ${CORNER*.38}px Space Mono,monospace`;
  ctx.fillStyle='#4ade80'; ctx.textAlign='center';
  ctx.fillText('GIGAPOLY',SIZE/2,SIZE/2-CORNER*.12);
  ctx.font=`${CORNER*.16}px Outfit,sans-serif`;
  ctx.fillStyle='rgba(232,234,246,.25)';
  ctx.fillText('🎲 Ukraine Edition',SIZE/2,SIZE/2+CORNER*.14);
  ctx.restore();

  BOARD.forEach((sp,id)=>{
    const p=cellPos(id); if(!p) return;
    drawCell(sp,p,id);
  });

  if(gameState) drawTokens();
}

function drawCell(sp,{x,y,w,h},id) {
  ctx.fillStyle='#111827'; ctx.strokeStyle='rgba(110,231,247,.18)'; ctx.lineWidth=1;
  ctx.fillRect(x,y,w,h); ctx.strokeRect(x,y,w,h);

  // Color strip
  if(sp.color){
    ctx.fillStyle=sp.color;
    const stripH=h*.22, stripW=w*.22;
    if(id>=1&&id<=9)   ctx.fillRect(x,y,w,stripH);
    if(id>=11&&id<=19) ctx.fillRect(x+w-stripW,y,stripW,h);
    if(id>=21&&id<=29) ctx.fillRect(x,y+h-stripH,w,stripH);
    if(id>=31&&id<=39) ctx.fillRect(x,y,stripW,h);
  }

  // Ownership tint + buildings
  if(gameState){
    const prop=gameState.properties?.find(p=>p.id===id);
    if(prop?.ownerId){
      const owner=gameState.players?.find(p=>p.id===prop.ownerId);
      if(owner){
        ctx.fillStyle=owner.color; ctx.globalAlpha=.18;
        ctx.fillRect(x,y,w,h); ctx.globalAlpha=1;
        if(prop.hotel){
          ctx.fillStyle='#f87171';
          ctx.fillRect(x+w*.3,y+h*.35,w*.4,h*.3);
        } else for(let i=0;i<prop.houses;i++){
          ctx.fillStyle='#4ade80';
          ctx.fillRect(x+3+i*7,y+h-10,6,7);
        }
      }
    }
  }

  // Icon
  const icons={go:'🏁',jail:'🔒',parking:'🅿️',gotojail:'👮',tax:'💸',community:'📦',chance:'❓',station:'✈️',utility:'⚡'};
  if(icons[sp.type]){
    ctx.font=`${Math.min(w,h)*.26}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(icons[sp.type],x+w/2,y+h*.42);
  }

  // Name
  ctx.fillStyle='rgba(232,234,246,.7)';
  ctx.font=`${Math.min(w,h)*.1}px Outfit,sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  const lines=sp.name.split('\n');
  const lh=Math.min(w,h)*.12;
  lines.forEach((ln,i)=>ctx.fillText(ln,x+w/2,y+h-2-(lines.length-1-i)*lh,w-3));

  // Price
  if(sp.price){
    ctx.fillStyle='#fbbf24';
    ctx.font=`${Math.min(w,h)*.09}px Space Mono,monospace`;
    ctx.fillText('$'+sp.price,x+w/2,y+h-1,w-3);
  }
}

function drawTokens() {
  const byPos={};
  gameState.players.forEach(p=>{
    if(!p.bankrupt){
      if(!byPos[p.position]) byPos[p.position]=[];
      byPos[p.position].push(p);
    }
  });
  Object.entries(byPos).forEach(([pos,players])=>{
    const cell=cellPos(+pos); if(!cell) return;
    const r=Math.min(cell.w,cell.h)*.14;
    players.forEach((p,i)=>{
      const cx=cell.x+cell.w/2+(i-(players.length-1)/2)*(r*2.4);
      const cy=cell.y+cell.h/2;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.fillStyle=p.color; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
      ctx.fillStyle='#060811';
      ctx.font=`bold ${r*.85}px Outfit,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(p.username[0].toUpperCase(),cx,cy);
    });
  });
}

// ── SOCKET ────────────────────────────────────
socket.on('connect', ()=>{ socket.emit('auth', token); });

socket.on('auth_ok', (user)=>{
  myId = user.id;
  setLoader('Joining room ' + roomCode + '...');
  socket.emit('join_room', roomCode);
});

socket.on('auth_error', ()=>{ location.href='/'; });

// Room update = we're in lobby / waiting
socket.on('room_update', (room)=>{
  currentRoom = room;
  isHost = (room.hostId === myId) || (room.players.find(p=>p.username===myUsername)?.id === myId && room.host===myUsername);
  showLobby(room);
});

// Game start / rejoin active game
socket.on('game_start', ({gameState:gs})=>{
  gameState = gs;
  showGame();
  updateUI();
  draw();
  addLog('🎮 Game started! Good luck!', true);
});

socket.on('game_update', ({gameState:gs, event})=>{
  gameState = gs;
  handleEvent(event);
  updateUI();
  draw();
});

socket.on('game_over', ({winner})=>{
  document.getElementById('winnerName').textContent = winner;
  document.getElementById('winnerScreen').classList.add('show');
});

socket.on('game_chat', ({username:uname, text})=>{
  const el = document.getElementById('chatList');
  const div = document.createElement('div');
  div.className = 'chat-item';
  div.innerHTML = `<span class="cn">${esc(uname)}</span>${esc(text)}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
});

socket.on('error', (msg)=>{
  const loaderVisible = document.getElementById('loader').style.display !== 'none';
  if(loaderVisible){
    setLoader('⚠ ' + msg + ' — going back...');
    setTimeout(()=>{ location.href='/'; }, 2000);
  } else {
    addLog('⚠ ' + msg);
  }
});

socket.on('disconnect', ()=>{
  if(gameState) addLog('⚠ Disconnected — trying to reconnect...');
});

socket.on('reconnect', ()=>{
  socket.emit('auth', token);
});

// ── SCREENS ───────────────────────────────────
function setLoader(msg){
  document.getElementById('loader').style.display='flex';
  document.getElementById('lobbyScreen').classList.remove('show');
  document.getElementById('gameScreen').classList.remove('show');
  document.getElementById('loader').querySelector('.loader-text').textContent=msg;
}

function showLobby(room){
  document.getElementById('loader').style.display='none';
  document.getElementById('lobbyScreen').classList.add('show');
  document.getElementById('gameScreen').classList.remove('show');

  document.getElementById('lobbyCodeVal').textContent = room.code;
  const colors=['#f87171','#60a5fa','#4ade80','#fbbf24','#c084fc','#f472b6'];
  document.getElementById('lobbyPlayersList').innerHTML = room.players.map((p,i)=>`
    <div class="lobby-player-row">
      <div class="lobby-av" style="background:${colors[i%colors.length]}">${p.username[0].toUpperCase()}</div>
      <span class="lobby-pname">${esc(p.username)}${p.username===myUsername?' (you)':''}</span>
      ${room.hostId===p.id?'<span style="font-size:.72rem;color:var(--gold)">👑 Host</span>':''}
    </div>`).join('');

  const n = room.players.length;
  const statusEl = document.getElementById('lobbyStatusText');
  const startBtn = document.getElementById('lobbyStartBtn');

  // Determine if current user is host
  const meInRoom = room.players.find(p=>p.username===myUsername);
  const amHost = meInRoom && room.hostId===meInRoom.id;

  if(amHost){
    startBtn.style.display='';
    startBtn.disabled = n < 2;
    statusEl.textContent = n<2 ? `Need at least 2 players (${n}/6)` : `${n} players ready — click Start!`;
  } else {
    startBtn.style.display='none';
    statusEl.textContent = `Waiting for host to start... (${n}/6 players)`;
  }
}

function showGame(){
  document.getElementById('loader').style.display='none';
  document.getElementById('lobbyScreen').classList.remove('show');
  document.getElementById('gameScreen').classList.add('show');
  document.getElementById('roomLabel').textContent='Room: '+roomCode;
  setTimeout(resize, 50);
}

// ── LOBBY ACTIONS ─────────────────────────────
function startGame(){
  socket.emit('start_game');
}
function leaveAndGoHome(){
  socket.emit('leave_room');
  location.href='/';
}

// ── GAME UI ───────────────────────────────────
function updateUI(){
  if(!gameState) return;
  const cp = gameState.players[gameState.currentPlayerIndex];
  const isMyTurn = cp?.id===myId;
  const me = gameState.players.find(p=>p.id===myId);

  document.getElementById('turnName').textContent = cp?.username||'-';
  if(me) document.getElementById('myMoney').textContent = '$'+me.money;

  // Buttons
  const roll=document.getElementById('btnRoll');
  const buy =document.getElementById('btnBuy');
  const pass=document.getElementById('btnPass');
  const jail=document.getElementById('btnJail');

  roll.disabled = !isMyTurn || gameState.phase!=='roll';
  buy.style.display  = (isMyTurn&&gameState.phase==='buy')  ?'':'none';
  pass.style.display = (isMyTurn&&(gameState.phase==='buy'||gameState.phase==='action'))?'':'none';
  jail.style.display = (isMyTurn&&cp?.inJail&&gameState.phase==='roll')?'':'none';
  buy.disabled  = false;
  pass.disabled = false;
  jail.disabled = me?.money<50;

  // Players
  document.getElementById('playersList').innerHTML=gameState.players.map((p,i)=>`
    <div class="player-row${i===gameState.currentPlayerIndex?' active':''}${p.bankrupt?' bankrupt':''}">
      <div class="p-avatar" style="background:${p.color}">${p.username[0].toUpperCase()}</div>
      <div class="p-info">
        <div class="p-name">${esc(p.username)}${p.id===myId?' ✦':''}</div>
        <div class="p-money">$${p.money}</div>
      </div>
      <span class="p-badge">${i===gameState.currentPlayerIndex?'▶':''}${p.bankrupt?'💀':''}${p.inJail?'🔒':''}</span>
    </div>`).join('');

  // Log
  const logEl=document.getElementById('logList');
  logEl.innerHTML=(gameState.log||[]).slice(-40).reverse().map((l,i)=>`
    <div class="log-item${i===0?' hi':''}">${esc(l)}</div>`).join('');
}

function addLog(text, hi=false){
  const el=document.getElementById('logList');
  const div=document.createElement('div');
  div.className='log-item'+(hi?' hi':'');
  div.textContent=text;
  el.prepend(div);
}

function handleEvent(ev){
  if(!ev) return;
  if(ev.type==='moved'||ev.type==='rolled'){
    animDice(gameState.dice[0],gameState.dice[1]);
    document.getElementById('diceSum').textContent=gameState.dice[0]+gameState.dice[1];
  }
  if(ev.landEvent?.type==='card'){
    document.getElementById('cardText').textContent=ev.landEvent.text;
    document.getElementById('cardOverlay').style.display='flex';
  }
  if(ev.landEvent?.type==='can_buy'){
    document.getElementById('propInfoName').textContent=ev.landEvent.property;
    document.getElementById('propInfoPrice').textContent='$'+ev.landEvent.price;
    document.getElementById('propInfo').classList.add('show');
  } else {
    document.getElementById('propInfo').classList.remove('show');
  }
}

function animDice(d1,d2){
  const FACES=['','⚀','⚁','⚂','⚃','⚄','⚅'];
  const e1=document.getElementById('die1');
  const e2=document.getElementById('die2');
  e1.classList.add('rolling'); e2.classList.add('rolling');
  let n=0;
  const t=setInterval(()=>{
    e1.textContent=FACES[Math.floor(Math.random()*6)+1];
    e2.textContent=FACES[Math.floor(Math.random()*6)+1];
    if(++n>8){
      clearInterval(t);
      e1.textContent=FACES[d1]; e2.textContent=FACES[d2];
      e1.classList.remove('rolling'); e2.classList.remove('rolling');
    }
  },80);
}

function act(type){
  socket.emit('game_action',{type});
  document.getElementById('propInfo').classList.remove('show');
}

function sendChat(){
  const inp=document.getElementById('chatInput');
  const t=inp.value.trim();
  if(!t) return;
  socket.emit('game_chat',t);
  inp.value='';
}

function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── EVENTS ────────────────────────────────────
document.getElementById('chatInput').addEventListener('keydown',e=>{ if(e.key==='Enter') sendChat(); });
window.addEventListener('resize', resize);
</script>
