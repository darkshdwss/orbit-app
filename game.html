<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GIGAPOLY 🎲</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root{--bg:#060811;--surface:#0d1117;--card:#111827;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#e8eaf6;--muted:rgba(232,234,246,.4);--accent:#6ee7f7;--gold:#fbbf24;--red:#f87171;--green:#4ade80;--purple:#c084fc;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow:hidden;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}

    /* LOADER */
    #loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
    .loader-ring{width:50px;height:50px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--accent);animation:spin .8s linear infinite;}
    .loader-text{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--muted);}

    /* LAYOUT */
    #gameApp{display:none;width:100vw;height:100vh;display:grid;grid-template-columns:1fr 320px;grid-template-rows:52px 1fr;}

    /* TOPBAR */
    .gtop{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(6,8,17,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);}
    .gtop-brand{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;letter-spacing:.1em;background:linear-gradient(90deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .gtop-info{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--muted);}
    .gtop-right{display:flex;gap:10px;align-items:center;}
    .leave-btn{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--red);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:600;transition:all .15s;}
    .leave-btn:hover{background:rgba(248,113,113,.22);}

    /* BOARD AREA */
    .board-area{position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg);padding:10px;}
    #boardCanvas{border-radius:4px;cursor:pointer;}

    /* SIDEBAR */
    .sidebar{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}

    /* PLAYERS PANEL */
    .players-panel{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
    .panel-title{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
    .player-row{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:9px;border:1px solid transparent;margin-bottom:5px;transition:all .2s;}
    .player-row.active{background:rgba(110,231,247,.08);border-color:rgba(110,231,247,.2);}
    .player-row.bankrupt{opacity:.35;}
    .p-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#060811;flex-shrink:0;}
    .p-info{flex:1;min-width:0;}
    .p-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .p-money{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--green);}
    .p-turn{font-size:.65rem;color:var(--accent);font-family:'Space Mono',monospace;flex-shrink:0;}

    /* ACTION PANEL */
    .action-panel{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
    .turn-label{font-size:.78rem;color:var(--muted);margin-bottom:10px;}
    .turn-name{color:var(--accent);font-weight:700;}
    .dice-row{display:flex;gap:10px;align-items:center;margin-bottom:12px;}
    .die{width:46px;height:46px;background:var(--card);border:1px solid var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;transition:transform .15s;}
    .die.rolling{animation:shake .15s infinite;}
    .action-btns{display:flex;flex-direction:column;gap:7px;}
    .abtn{padding:9px 16px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;border:1px solid;transition:all .15s;text-align:center;}
    .abtn:disabled{opacity:.4;cursor:not-allowed;}
    .abtn-roll{background:linear-gradient(135deg,var(--accent),var(--purple));border-color:transparent;color:#060811;}
    .abtn-roll:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(110,231,247,.3);}
    .abtn-buy{background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.3);color:var(--green);}
    .abtn-buy:hover:not(:disabled){background:rgba(74,222,128,.25);}
    .abtn-pass{background:rgba(255,255,255,.05);border-color:var(--border2);color:var(--muted);}
    .abtn-pass:hover:not(:disabled){color:var(--text);background:rgba(255,255,255,.08);}
    .abtn-jail{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.3);color:var(--gold);}
    .abtn-jail:hover:not(:disabled){background:rgba(251,191,36,.22);}
    .abtn-house{background:rgba(192,132,252,.12);border-color:rgba(192,132,252,.3);color:var(--purple);}
    .abtn-house:hover:not(:disabled){background:rgba(192,132,252,.22);}

    /* PROPERTY POPUP */
    .prop-popup{background:rgba(13,17,28,.95);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;font-size:.76rem;color:var(--muted);margin-bottom:8px;display:none;}
    .prop-popup.show{display:block;}
    .prop-name{font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:4px;}
    .prop-price{color:var(--gold);font-family:'Space Mono',monospace;font-weight:700;}

    /* LOG */
    .log-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .log-title{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;padding:10px 12px 6px;flex-shrink:0;border-bottom:1px solid var(--border);}
    .log-entries{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:3px;}
    .log-entries::-webkit-scrollbar{width:3px;}
    .log-entries::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
    .log-entry{font-size:.74rem;color:var(--muted);line-height:1.4;padding:3px 0;border-bottom:1px solid var(--border);}
    .log-entry.highlight{color:var(--text);}

    /* CHAT */
    .chat-panel{border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;max-height:180px;}
    .chat-msgs{flex:1;overflow-y:auto;padding:6px 10px;display:flex;flex-direction:column;gap:3px;}
    .chat-msg{font-size:.74rem;line-height:1.4;}
    .chat-msg .cn{color:var(--accent);font-weight:700;margin-right:5px;}
    .chat-input-row{display:flex;gap:6px;padding:6px 10px;border-top:1px solid var(--border);}
    .chat-input{flex:1;background:var(--card);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.8rem;padding:6px 10px;outline:none;}
    .chat-input:focus{border-color:var(--accent);}
    .chat-send{background:var(--accent);border:none;color:#060811;width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

    /* OVERLAY POPUPS */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
    .popup{background:var(--card);border:1px solid var(--border2);border-radius:18px;padding:28px;max-width:420px;width:100%;text-align:center;animation:fadeUp .25s ease;}
    .popup-icon{font-size:3rem;margin-bottom:12px;}
    .popup-title{font-family:'Outfit',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:8px;}
    .popup-sub{font-size:.88rem;color:var(--muted);margin-bottom:22px;line-height:1.5;}
    .popup-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
    .pbtn{padding:10px 22px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;border:1px solid;transition:all .15s;}
    .pbtn-primary{background:linear-gradient(135deg,var(--accent),var(--purple));border-color:transparent;color:#060811;}
    .pbtn-primary:hover{transform:translateY(-1px);}
    .pbtn-secondary{background:rgba(255,255,255,.05);border-color:var(--border2);color:var(--muted);}
    .pbtn-secondary:hover{color:var(--text);}

    /* WINNER SCREEN */
    #winnerScreen{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;z-index:200;}
    #winnerScreen.show{display:flex;}
    .winner-box{background:var(--card);border:1px solid var(--border2);border-radius:22px;padding:40px;text-align:center;max-width:400px;animation:fadeUp .4s ease;}
    .winner-emoji{font-size:4rem;margin-bottom:14px;}
    .winner-title{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--gold);margin-bottom:8px;}
    .winner-name{font-size:1.6rem;font-weight:800;margin-bottom:20px;}
  </style>
</head>
<body>

<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Connecting to game...</div>
</div>

<div id="gameApp" style="display:none">
  <!-- TOPBAR -->
  <header class="gtop">
    <span class="gtop-brand">🎲 GIGAPOLY</span>
    <span class="gtop-info" id="roomLabel">Room: ------</span>
    <div class="gtop-right">
      <span class="gtop-info" id="myMoneyLabel">$1500</span>
      <button class="leave-btn" onclick="leaveGame()">Leave Game</button>
    </div>
  </header>

  <!-- BOARD -->
  <div class="board-area">
    <canvas id="boardCanvas"></canvas>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <!-- Players -->
    <div class="players-panel">
      <div class="panel-title">Players</div>
      <div id="playersList"></div>
    </div>

    <!-- Actions -->
    <div class="action-panel">
      <div class="turn-label">Turn: <span class="turn-name" id="turnName">-</span></div>
      <div class="dice-row">
        <div class="die" id="die1">🎲</div>
        <div class="die" id="die2">🎲</div>
        <span style="font-family:'Space Mono',monospace;font-size:.8rem;color:var(--muted)" id="diceTotal"></span>
      </div>
      <div class="prop-popup" id="propPopup">
        <div class="prop-name" id="propName"></div>
        <div class="prop-price" id="propPrice"></div>
      </div>
      <div class="action-btns">
        <button class="abtn abtn-roll" id="btnRoll" onclick="doAction('roll')" disabled>🎲 Roll Dice</button>
        <button class="abtn abtn-buy"  id="btnBuy"  onclick="doAction('buy')"  disabled style="display:none">💰 Buy Property</button>
        <button class="abtn abtn-pass" id="btnPass" onclick="doAction('pass')" disabled style="display:none">⏭ Pass</button>
        <button class="abtn abtn-jail" id="btnJail" onclick="doAction('pay_jail')" disabled style="display:none">🔓 Pay $50 (Jail)</button>
      </div>
    </div>

    <!-- Log -->
    <div class="log-panel">
      <div class="log-title">Game Log</div>
      <div class="log-entries" id="logEntries"></div>
    </div>

    <!-- Chat -->
    <div class="chat-panel">
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput" placeholder="Chat..." maxlength="100"/>
        <button class="chat-send" onclick="sendChat()">➤</button>
      </div>
    </div>
  </aside>
</div>

<!-- CARD POPUP -->
<div class="overlay" id="cardOverlay" style="display:none">
  <div class="popup">
    <div class="popup-icon" id="cardIcon">🃏</div>
    <div class="popup-title" id="cardTitle">Card Drawn</div>
    <div class="popup-sub" id="cardText"></div>
    <div class="popup-btns">
      <button class="pbtn pbtn-primary" onclick="closeCardPopup()">OK</button>
    </div>
  </div>
</div>

<!-- WINNER SCREEN -->
<div id="winnerScreen">
  <div class="winner-box">
    <div class="winner-emoji">🏆</div>
    <div class="winner-title">WINNER!</div>
    <div class="winner-name" id="winnerName"></div>
    <div style="color:var(--muted);font-size:.88rem;margin-bottom:20px">Congratulations on dominating the economy!</div>
    <button class="pbtn pbtn-primary" onclick="leaveGame()">Back to ORBIT</button>
  </div>
</div>

<script>
const token    = localStorage.getItem('orbit_token');
const username = localStorage.getItem('orbit_user');
const roomCode = new URLSearchParams(location.search).get('room');

if (!token || !username || !roomCode) {
  location.href = '/';
}

const socket = io();
let gameState = null;
let myId = null;
let animating = false;

// ── BOARD CONSTANTS ──────────────────────────
const BOARD = [
  {id:0,name:'GO',type:'go'},
  {id:1,name:'Kyiv',type:'property',color:'#8dd3c7',price:60},
  {id:2,name:'Community\nChest',type:'community'},
  {id:3,name:'Odesa',type:'property',color:'#8dd3c7',price:60},
  {id:4,name:'Income\nTax',type:'tax'},
  {id:5,name:'Airport',type:'station',price:200},
  {id:6,name:'Lviv',type:'property',color:'#fb8072',price:100},
  {id:7,name:'Chance',type:'chance'},
  {id:8,name:'Dnipro',type:'property',color:'#fb8072',price:100},
  {id:9,name:'Kharkiv',type:'property',color:'#fb8072',price:120},
  {id:10,name:'Jail',type:'jail'},
  {id:11,name:'Zaporizhzhia',type:'property',color:'#80b1d3',price:140},
  {id:12,name:'Electric\nCo.',type:'utility'},
  {id:13,name:'Mykolaiv',type:'property',color:'#80b1d3',price:140},
  {id:14,name:'Vinnytsia',type:'property',color:'#80b1d3',price:160},
  {id:15,name:'Station\nNorth',type:'station',price:200},
  {id:16,name:'Poltava',type:'property',color:'#fdb462',price:180},
  {id:17,name:'Community\nChest',type:'community'},
  {id:18,name:'Sumy',type:'property',color:'#fdb462',price:180},
  {id:19,name:'Cherkasy',type:'property',color:'#fdb462',price:200},
  {id:20,name:'Free\nParking',type:'parking'},
  {id:21,name:'Zhytomyr',type:'property',color:'#bc80bd',price:220},
  {id:22,name:'Chance',type:'chance'},
  {id:23,name:'Rivne',type:'property',color:'#bc80bd',price:220},
  {id:24,name:'Lutsk',type:'property',color:'#bc80bd',price:240},
  {id:25,name:'Station\nWest',type:'station',price:200},
  {id:26,name:'Ternopil',type:'property',color:'#b3de69',price:260},
  {id:27,name:'Ivano-\nFrankivsk',type:'property',color:'#b3de69',price:260},
  {id:28,name:'Water\nWorks',type:'utility'},
  {id:29,name:'Uzhhorod',type:'property',color:'#b3de69',price:280},
  {id:30,name:'Go To\nJail',type:'gotojail'},
  {id:31,name:'Chernivtsi',type:'property',color:'#ffed6f',price:300},
  {id:32,name:'Khmelnytskyi',type:'property',color:'#ffed6f',price:300},
  {id:33,name:'Community\nChest',type:'community'},
  {id:34,name:'Zaporizhzhia-2',type:'property',color:'#ffed6f',price:320},
  {id:35,name:'Station\nEast',type:'station',price:200},
  {id:36,name:'Chance',type:'chance'},
  {id:37,name:'Donetsk',type:'property',color:'#fc8d59',price:350},
  {id:38,name:'Luxury\nTax',type:'tax'},
  {id:39,name:'Luhansk',type:'property',color:'#e31a1c',price:400},
];

const DICE_DOTS = {
  1:[[.5,.5]],
  2:[[.25,.25],[.75,.75]],
  3:[[.25,.25],[.5,.5],[.75,.75]],
  4:[[.25,.25],[.75,.25],[.25,.75],[.75,.75]],
  5:[[.25,.25],[.75,.25],[.5,.5],[.25,.75],[.75,.75]],
  6:[[.25,.2],[.75,.2],[.25,.5],[.75,.5],[.25,.8],[.75,.8]],
};

// ── CANVAS SETUP ─────────────────────────────
const canvas = document.getElementById('boardCanvas');
const ctx = canvas.getContext('2d');
let CELL = 56, CORNER = 84, COLS = 9, SIZE;

function resizeBoard() {
  const area = document.querySelector('.board-area');
  const maxW = area.clientWidth - 20;
  const maxH = area.clientHeight - 20;
  const avail = Math.min(maxW, maxH);
  CORNER = Math.floor(avail / 11.5);
  CELL   = Math.floor((avail - CORNER * 2) / 9);
  SIZE   = CORNER * 2 + CELL * 9;
  canvas.width  = SIZE;
  canvas.height = SIZE;
  drawBoard();
}

function cellPos(id) {
  // Returns {x, y, w, h, rot} for each cell
  const c = CELL, co = CORNER, s = SIZE;
  if (id === 0)  return {x:s-co, y:s-co, w:co, h:co}; // GO (bottom right)
  if (id <= 9)   return {x:s-co-(id)*c, y:s-co, w:c, h:co}; // bottom row
  if (id === 10) return {x:0, y:s-co, w:co, h:co}; // jail
  if (id <= 19)  return {x:0, y:s-co-(id-10)*c, w:co, h:c}; // left col
  if (id === 20) return {x:0, y:0, w:co, h:co}; // free parking
  if (id <= 29)  return {x:(id-20)*c, y:0, w:c, h:co}; // top row
  if (id === 30) return {x:s-co, y:0, w:co, h:co}; // go to jail
  if (id <= 39)  return {x:s-co, y:(id-30)*c, w:co, h:c}; // right col
}

function drawBoard() {
  ctx.clearRect(0,0,SIZE,SIZE);
  // Board background
  ctx.fillStyle = '#0d1a0d';
  ctx.fillRect(0,0,SIZE,SIZE);

  // Center area
  ctx.fillStyle = '#0a1a0a';
  const ci = CORNER;
  ctx.fillRect(ci,ci,SIZE-ci*2,SIZE-ci*2);

  // Center text
  ctx.save();
  ctx.font = `bold ${CORNER*.4}px Space Mono,monospace`;
  ctx.fillStyle = '#4ade80';
  ctx.textAlign = 'center';
  ctx.fillText('GIGAPOLY', SIZE/2, SIZE/2 - CORNER*.15);
  ctx.font = `${CORNER*.18}px Outfit,sans-serif`;
  ctx.fillStyle = 'rgba(232,234,246,.3)';
  ctx.fillText('🎲 Ukraine Edition', SIZE/2, SIZE/2 + CORNER*.15);
  ctx.restore();

  // Draw all cells
  BOARD.forEach((space, id) => {
    const pos = cellPos(id);
    if (!pos) return;
    drawCell(ctx, space, pos, id);
  });

  // Draw players
  if (gameState) drawPlayers();
}

function drawCell(ctx, space, pos, id) {
  const {x, y, w, h} = pos;
  // Background
  ctx.fillStyle = '#111827';
  ctx.strokeStyle = 'rgba(110,231,247,.2)';
  ctx.lineWidth = 1;
  ctx.fillRect(x,y,w,h);
  ctx.strokeRect(x,y,w,h);

  // Property color strip
  if (space.color) {
    const isHoriz = (id >= 1 && id <= 9) || (id >= 21 && id <= 29);
    const stripH = h * .22;
    const stripW = w * .22;
    ctx.fillStyle = space.color;
    if (id >= 1 && id <= 9)   ctx.fillRect(x, y, w, stripH);
    if (id >= 11 && id <= 19) ctx.fillRect(x+w-stripW, y, stripW, h);
    if (id >= 21 && id <= 29) ctx.fillRect(x, y+h-stripH, w, stripH);
    if (id >= 31 && id <= 39) ctx.fillRect(x, y, stripW, h);
  }

  // Property ownership
  if (gameState) {
    const prop = gameState.properties?.find(p => p.id === id);
    if (prop?.ownerId) {
      const owner = gameState.players?.find(p => p.id === prop.ownerId);
      if (owner) {
        ctx.fillStyle = owner.color;
        ctx.globalAlpha = .25;
        ctx.fillRect(x,y,w,h);
        ctx.globalAlpha = 1;
        // Houses/hotel
        if (prop.hotel) {
          ctx.fillStyle = '#f87171';
          ctx.fillRect(x+w/2-6,y+h/2-6,12,12);
        } else if (prop.houses > 0) {
          for (let i=0;i<prop.houses;i++) {
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(x+4+i*8, y+h-12, 7, 7);
          }
        }
      }
    }
  }

  // Icon for special spaces
  ctx.font = `${Math.min(w,h)*.28}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const icons = {go:'🏁',jail:'🔒',parking:'🅿️',gotojail:'👮',tax:'💸',community:'📦',chance:'❓',station:'✈️',utility:'⚡'};
  if (icons[space.type]) {
    ctx.fillText(icons[space.type], x+w/2, y+h*.45);
  }

  // Name text
  ctx.fillStyle = 'rgba(232,234,246,.75)';
  ctx.font = `${Math.min(w,h)*.11}px Outfit,sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  const lines = space.name.split('\n');
  const lineH = Math.min(w,h)*.13;
  lines.forEach((line,i) => {
    ctx.fillText(line, x+w/2, y+h - 3 - (lines.length-1-i)*lineH, w-4);
  });

  // Price
  if (space.price) {
    ctx.fillStyle = '#fbbf24';
    ctx.font = `${Math.min(w,h)*.1}px Space Mono,monospace`;
    ctx.fillText('$'+space.price, x+w/2, y+h-2, w-4);
  }
}

function drawPlayers() {
  if (!gameState?.players) return;
  // Group players by position
  const byPos = {};
  gameState.players.forEach(p => {
    if (!p.bankrupt) {
      if (!byPos[p.position]) byPos[p.position] = [];
      byPos[p.position].push(p);
    }
  });
  Object.entries(byPos).forEach(([pos, players]) => {
    const cell = cellPos(+pos);
    if (!cell) return;
    const r = Math.min(cell.w, cell.h) * .15;
    players.forEach((p, i) => {
      const cx = cell.x + cell.w/2 + (i - (players.length-1)/2) * (r*2.2);
      const cy = cell.y + cell.h/2;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#060811';
      ctx.font = `bold ${r*.9}px Outfit,sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.username[0].toUpperCase(), cx, cy);
    });
  });
}

// ── DICE RENDERING ────────────────────────────
function drawDie(elId, value) {
  const el = document.getElementById(elId);
  if (!value) { el.textContent = '🎲'; return; }
  const FACES = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
  el.textContent = FACES[value];
  el.classList.remove('rolling');
}

function animateDice(d1, d2) {
  const die1 = document.getElementById('die1');
  const die2 = document.getElementById('die2');
  die1.classList.add('rolling');
  die2.classList.add('rolling');
  let count = 0;
  const interval = setInterval(() => {
    die1.textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][Math.floor(Math.random()*6)];
    die2.textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][Math.floor(Math.random()*6)];
    count++;
    if (count > 8) {
      clearInterval(interval);
      drawDie('die1', d1);
      drawDie('die2', d2);
      die1.classList.remove('rolling');
      die2.classList.remove('rolling');
    }
  }, 80);
}

// ── SOCKET EVENTS ─────────────────────────────
socket.on('connect', () => {
  socket.emit('auth', token);
});

socket.on('auth_ok', (user) => {
  myId = user.id;
  document.getElementById('loader').style.display = 'none';
  document.getElementById('gameApp').style.display = 'grid';
  document.getElementById('roomLabel').textContent = 'Room: ' + roomCode;
  resizeBoard();
  socket.emit('join_room', roomCode);
});

socket.on('auth_error', () => {
  location.href = '/';
});

socket.on('game_update', ({ gameState: gs, event }) => {
  gameState = gs;
  handleEvent(event);
  updateUI();
  drawBoard();
});

socket.on('game_start', ({ gameState: gs }) => {
  gameState = gs;
  updateUI();
  drawBoard();
  addLog('🎮 Game started! Good luck everyone!', true);
});

socket.on('game_over', ({ winner }) => {
  document.getElementById('winnerName').textContent = winner;
  document.getElementById('winnerScreen').classList.add('show');
});

socket.on('game_chat', ({ username: uname, text }) => {
  const msgs = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = `<span class="cn">${esc(uname)}</span>${esc(text)}`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
});

socket.on('error', (msg) => {
  addLog('⚠ ' + msg);
});

socket.on('room_update', (room) => {
  // Still in lobby — shouldn't happen mid-game
});

// ── EVENT HANDLER ─────────────────────────────
function handleEvent(event) {
  if (!event) return;
  if (event.type === 'rolled') {
    animateDice(gameState.dice[0], gameState.dice[1]);
    document.getElementById('diceTotal').textContent = gameState.dice[0] + gameState.dice[1];
  }
  if (event.type === 'moved') {
    animateDice(gameState.dice[0], gameState.dice[1]);
    document.getElementById('diceTotal').textContent = gameState.dice[0] + gameState.dice[1];
  }
  if (event.landEvent?.type === 'card') {
    showCardPopup(event.landEvent.text);
  }
  if (event.landEvent?.type === 'can_buy') {
    showPropPopup(event.landEvent.property, event.landEvent.price);
  }
}

function showCardPopup(text) {
  document.getElementById('cardText').textContent = text;
  document.getElementById('cardOverlay').style.display = 'flex';
}
function closeCardPopup() {
  document.getElementById('cardOverlay').style.display = 'none';
}
function showPropPopup(name, price) {
  document.getElementById('propName').textContent = name;
  document.getElementById('propPrice').textContent = '$' + price;
  document.getElementById('propPopup').classList.add('show');
}
function hidePropPopup() {
  document.getElementById('propPopup').classList.remove('show');
}

// ── UI UPDATE ─────────────────────────────────
function updateUI() {
  if (!gameState) return;
  const cp = gameState.players[gameState.currentPlayerIndex];
  const isMyTurn = cp?.id === myId;
  const me = gameState.players.find(p => p.id === myId);

  document.getElementById('turnName').textContent = cp?.username || '-';
  if (me) {
    document.getElementById('myMoneyLabel').textContent = '$' + me.money;
  }

  // Buttons
  const btnRoll = document.getElementById('btnRoll');
  const btnBuy  = document.getElementById('btnBuy');
  const btnPass = document.getElementById('btnPass');
  const btnJail = document.getElementById('btnJail');

  btnRoll.disabled = !isMyTurn || gameState.phase !== 'roll';
  btnRoll.style.display = '';

  if (isMyTurn && gameState.phase === 'buy') {
    btnBuy.style.display  = '';
    btnPass.style.display = '';
    btnBuy.disabled  = false;
    btnPass.disabled = false;
  } else {
    btnBuy.style.display  = 'none';
    btnPass.style.display = 'none';
  }

  if (isMyTurn && gameState.phase === 'action') {
    btnPass.style.display = '';
    btnPass.disabled = false;
  }

  if (isMyTurn && cp?.inJail && gameState.phase === 'roll') {
    btnJail.style.display = '';
    btnJail.disabled = cp.money < 50;
  } else {
    btnJail.style.display = 'none';
  }

  // Players list
  document.getElementById('playersList').innerHTML = gameState.players.map((p,i) => `
    <div class="player-row ${i===gameState.currentPlayerIndex?'active':''} ${p.bankrupt?'bankrupt':''}">
      <div class="p-avatar" style="background:${p.color}">${p.username[0].toUpperCase()}</div>
      <div class="p-info">
        <div class="p-name">${esc(p.username)}${p.id===myId?' (you)':''}</div>
        <div class="p-money">$${p.money}</div>
      </div>
      ${i===gameState.currentPlayerIndex?'<span class="p-turn">▶ TURN</span>':''}
      ${p.bankrupt?'<span style="font-size:.7rem;color:var(--red)">💀</span>':''}
      ${p.inJail?'<span style="font-size:.8rem">🔒</span>':''}
    </div>
  `).join('');

  // Log
  const logEl = document.getElementById('logEntries');
  const lastLogs = (gameState.log || []).slice(-30).reverse();
  logEl.innerHTML = lastLogs.map((l,i) => `<div class="log-entry ${i===0?'highlight':''}">${esc(l)}</div>`).join('');
}

function addLog(text, highlight=false) {
  const logEl = document.getElementById('logEntries');
  const div = document.createElement('div');
  div.className = 'log-entry' + (highlight ? ' highlight' : '');
  div.textContent = text;
  logEl.prepend(div);
}

// ── ACTIONS ───────────────────────────────────
function doAction(type, extra={}) {
  socket.emit('game_action', { type, ...extra });
  hidePropPopup();
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  socket.emit('game_chat', text);
  input.value = '';
}

function leaveGame() {
  socket.emit('leave_room');
  location.href = '/';
}

function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── KEYBOARD ──────────────────────────────────
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendChat();
});

// ── RESIZE ────────────────────────────────────
window.addEventListener('resize', resizeBoard);

// ── INIT ──────────────────────────────────────
window.addEventListener('load', () => {
  resizeBoard();
});
</script>
